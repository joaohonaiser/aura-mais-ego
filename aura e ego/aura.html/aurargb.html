<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura RGB</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        .texto-aura {
            font-size: 15vw;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 10px;
            
            /* Efeito RGB */
            background: linear-gradient(
                to right, 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000
            );
            background-size: 200% auto; /* Faz o gradiente ser maior que o texto para ele "correr" */
            -webkit-background-clip: text; /* Recorta o fundo no formato do texto (Chrome/Safari) */
            -webkit-text-fill-color: transparent; /* Deixa o preenchimento original transparente */
            
            /* Animação */
            animation: animaRGB 3s linear infinite;
            
            /* Um brilho suave para destacar no fundo preto */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        /* Movimentação das cores */
        @keyframes animaRGB {
            to {
                background-position: 200% center;
            }
        }
    </style>
</head>
<body>


    <div class="aura-container" style="position: relative; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden;">

        <svg id="svg-raios" viewBox="0 0 600 600" style="position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1;">
            <defs>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            
            <path id="raio-path" d="" stroke="white" stroke-width="4" fill="none" filter="url(#glow)" />
        </svg>
    
        <h1 class="texto-aura" style="position: relative; z-index: 2; font-size: 15vw; font-family: sans-serif;">
            AURA
        </h1>
    
    </div>
    
    <button id="btn-start" style="position: fixed; top: 20px; z-index: 100; cursor: pointer; padding: 10px 20px;">
        ATIVAR TEMPESTADE ⚡
    </button>
    
    <audio id="audio-trovao" loop>
        <source src="https://www.soundjay.com/nature/sounds/thunder-rain-01.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
