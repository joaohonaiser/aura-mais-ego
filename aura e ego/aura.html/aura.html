<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totя</title>
    <style>
        /* Remove margens padrão e faz o corpo ocupar 100% da tela */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            background-color: #000;  /* Fundo preto para dar destaque */
            overflow: hidden;        /* Evita barras de rolagem */
            font-family: 'Arial', sans-serif;
        }

        .texto-Totя {
            color: white;
            font-size: 15vw;         /* Tamanho gigante baseado na largura da tela */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 10px;
            /* Adicionei um brilho suave para combinar com o nome */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="texto-Totя">Totя</div>

</body>
</html>
